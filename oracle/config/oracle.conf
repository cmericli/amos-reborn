# Oracle Pipeline Configuration
# AMOS Reborn — FS-UAE automated capture pipeline

# FS-UAE binary location (macOS)
FSUAE_BIN=/Applications/FS-UAE.app/Contents/MacOS/fs-uae

# Kickstart ROMs (relative to project root)
KICKSTART_ROM=oracle/roms/kick31.rom

# Hard drive images (relative to project root)
BOOT_HDF=oracle/disks/workbench.hdf
AMOS_HDF=oracle/disks/amos-pro.hdf

# Amiga model
AMIGA_MODEL=A1200

# Timing (seconds)
BOOT_TIMEOUT=30
TEST_TIMEOUT=15
SCREENSHOT_DELAY=3

# Reborn capture binary (relative to project root)
REBORN_BIN=build/oracle-capture

# Directories (relative to project root)
PROGRAMS_DIR=oracle/programs
STAGING_DIR=oracle/staging
OUTPUT_ORACLE_DIR=oracle/output/oracle
OUTPUT_REBORN_DIR=oracle/output/reborn
OUTPUT_DIFFS_DIR=oracle/output/diffs
REFERENCE_DIR=oracle/reference
